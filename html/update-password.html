<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Nova Senha | Verse</title>

  <meta
    name="description"
    content="Crie uma nova senha para acessar sua conta Verse.">

  <link rel="stylesheet" href="../css/base/reset.css">
  <link rel="stylesheet" href="../css/base/global.css">

  <link rel="stylesheet" href="../css/pages/forgot-password.css">

  <link rel="icon" href="../assets/favicon/favicon.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Belleza&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <main class="forgot-container">

    <div class="forgot-card">

      <div class="logo-area">
        <a href="../index.html" class="logo-link">
          <h1>VERSE</h1>
        </a> 
        <span class="logo-line"></span>
      </div>

      <h2>Nova Senha</h2>

      <p class="subtitle">
        <p class="subtitle">
          Você está a um passo de recuperar sua conta. Defina uma nova senha para continuar sua jornada na Verse.
        </p>
      </p>

      <form id="updatePasswordForm">

        <div class="form-group">
          <div class="input-wrapper password-wrapper">
            <input
              type="password"
              id="newPassword"
              name="newPassword"
              required
              minlength="6">

            <label for="newPassword">Nova senha</label>

            <button
              type="button"
              class="password-toggle"
              aria-label="Mostrar senha">
              <span class="eye-icon"></span>
            </button>
          </div>
        </div>

        <div class="form-group">
          <div class="input-wrapper password-wrapper">

            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              required
              minlength="6">

            <label for="confirmPassword">
              Confirmar senha
            </label>

            <button
              type="button"
              class="password-toggle"
              aria-label="Mostrar senha">

              <span class="eye-icon"></span>

            </button>

          </div>
        </div>

        <p id="passwordError" class="password-error"></p>

        <button
          type="submit"
          class="submit-btn">
          Salvar nova senha
        </button>

      </form>

      <a
        href="../html/login.html"
        class="back-link">
        Voltar para Login
      </a>

    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabaseClient.js"></script>

  <script src="../js/modules/password-toggle.js"></script>
  <script src="../js/auth/update-password.js"></script>

</body>
</html>
