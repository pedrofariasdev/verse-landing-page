<!DOCTYPE html>
<html lang="pt">
<head>

  <link rel="icon" type="image/x-icon" href="../assets/favicon/favicon.ico">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>História | Verse</title>

  <link rel="stylesheet" href="../css/base/reset.css">
  <link rel="stylesheet" href="../css/base/global.css">

  <link rel="stylesheet" href="../css/components/navbar.css">
  <link rel="stylesheet" href="../css/components/search.css">
  <link rel="stylesheet" href="../css/components/notifications.css">
  <link rel="stylesheet" href="../css/components/dropdown.css">
  <link rel="stylesheet" href="../css/components/avatar.css">

  <link rel="stylesheet" href="../css/pages/story-view.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Belleza&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

  <!-- NAVBAR -->

  <nav class="navbar">

    <div class="logo">
      <a href="../html/feed.html" class="logo-link">
        <h1>VERSE</h1>
        <div class="logo-line"></div>
      </a>
    </div>

    <div class="search-wrapper">

      <input
        type="text"
        id="globalSearchInput"
        placeholder="Pesquisar na Verse..."
        autocomplete="off">

      <div
        id="globalSearchResults"
        class="global-search-results">
      </div>

    </div>

    <div class="nav-actions">

      <a href="../html/feed.html" class="nav-icon-btn">🏠</a>

      <a href="../html/stories.html" class="nav-icon-btn">📚</a>

      <a href="../html/comunities.html" class="nav-icon-btn">👥</a>

      <div class="notification-wrapper">

        <button
          id="notificationBtn"
          class="notification-btn"
          type="button">

          🔔

          <span
            id="notificationBadge"
            class="notification-badge">
            0
          </span>

        </button>

      </div>

      <div class="profile-menu-wrapper">

        <button
          class="profile-menu-btn"
          id="profileMenuBtn"
          type="button">

          <div
            class="nav-avatar"
            id="navAvatar">
            V
          </div>

        </button>

      </div>

    </div>

  </nav>

  <!-- CONTEÚDO -->

  <main class="story-view-container">

    <section class="story-header">

      <div
        id="storyCover"
        class="story-cover-large">

        V

      </div>

      <div class="story-info">

        <span id="storyGenre" class="story-genre">
          Fantasia
        </span>

        <h1 id="storyTitle">
          Carregando...
        </h1>

        <p
          id="storyAuthor"
          class="story-author">
          Autor
        </p>

        <div class="story-stats">

          <div>
            <strong id="storyViews">
              0
            </strong>

            <span>Leituras</span>
          </div>

          <div>
            <strong id="storyLikes">
              0
            </strong>

            <span>Curtidas</span>
          </div>

          <div>
            <strong id="storyComments">
              0
            </strong>

            <span>Comentários</span>
          </div>

          <div>
            <strong id="storyRating">
              0.0
            </strong>

            <span>Avaliação</span>
          </div>

        </div>

        <div class="story-buttons">

          <button
            type="button"
            id="startReadingBtn"
            class="primary-story-btn">

            Começar Leitura

          </button>

          <button
            type="button"
            id="favoriteStoryBtn"
            class="secondary-story-btn">

            Favoritar

          </button>

        </div>

      </div>

    </section>

    <!-- SINOPSE -->

    <section class="story-description-card">

      <h2>Sinopse</h2>

      <p id="storyDescription">

        Carregando descrição...

      </p>

    </section>

    <!-- CAPÍTULOS -->

    <section class="story-chapters-card">

      <div class="story-chapters-header">

        <h2>Capítulos</h2>

        <span id="chaptersCount">
          0 capítulos
        </span>

      </div>

      <div
        id="storyChaptersList"
        class="story-chapters-list">

        <p>Carregando capítulos...</p>

      </div>

    </section>

  </main>

  <!-- SUPABASE -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="../js/supabaseClient.js"></script>

  <!-- MODULES -->

  <script src="../js/modules/auth.js"></script>
  <script src="../js/modules/utils.js"></script>
  <script src="../js/modules/avatar.js"></script>
  <script src="../js/modules/search.js"></script>
  <script src="../js/modules/menu.js"></script>
  <script src="../js/modules/notifications.js"></script>
  <script src="../js/modules/messages.js"></script>

  <!-- PAGE -->

  <script src="../js/pages/story-view.js"></script>

</body>
</html>
