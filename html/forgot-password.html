<!DOCTYPE html>
<html lang="pt">
<head>

      <link rel="icon" type="image/x-icon" href="../assets/favicon/favicon.ico">

  <link rel="icon" type="image/png" sizes="32x32"
        href="../assets/favicon/favicon-32x32.png">

  <link rel="icon" type="image/png" sizes="16x16"
        href="../assets/favicon/favicon-16x16.png">

  <link rel="apple-touch-icon"
        href="../assets/favicon/apple-touch-icon.png">

  <link rel="manifest"
        href="../assets/favicon/site.webmanifest">

    <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#79B4A9">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Recuperar Senha | Verse</title>

    <meta
        name="description"
        content="Recupere o acesso à sua conta Verse.">

    <link rel="stylesheet" href="../css/base/reset.css">
    <link rel="stylesheet" href="../css/base/global.css">

    <link rel="stylesheet" href="../css/pages/forgot-password.css">

    <link rel="icon" href="../assets/favicon/favicon.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Belleza&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <main class="forgot-container">

        <div class="forgot-card">

          <div class="logo-area">
            <a href="../index.html" class="logo-link">
              <h1>VERSE</h1>
            </a> 
            <span class="logo-line"></span>
          </div>

            <h2>Recuperar Senha</h2>

            <p class="subtitle">
                Informe o e-mail da sua conta e enviaremos um link para redefinir sua senha.
            </p>

            <form id="forgotPasswordForm">

                <div class="form-group">

                    <div class="input-wrapper">

                        <input
                            type="email"
                            id="email"
                            name="email"
                            required>

                        <label for="email">
                            E-mail
                        </label>

                    </div>

                </div>

                <button
                    type="submit"
                    class="submit-btn">

                    Enviar Link

                </button>

            </form>

            <a
                href="../html/login.html"
                class="back-link">

                Voltar para Login

            </a>

        </div>

    </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="../js/supabaseClient.js"></script>

  <script src="../js/auth/forgot-password.js"></script>

</body>
</html>
