<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta
    name="description"
    content="Gerencie as configurações da sua conta, perfil, notificações e aparência na Verse.">

  <title>Verse - Configurações</title>

  <link rel="stylesheet" href="../css/base/reset.css">
  <link rel="stylesheet" href="../css/base/global.css">

  <link rel="stylesheet" href="../css/components/navbar.css">
  <link rel="stylesheet" href="../css/components/search.css">
  <link rel="stylesheet" href="../css/components/notifications.css">
  <link rel="stylesheet" href="../css/components/dropdown.css">
  <link rel="stylesheet" href="../css/components/avatar.css">
  <link rel="stylesheet" href="../css/components/sidebar.css">

  <link rel="stylesheet" href="../css/pages/settings.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Belleza&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <nav class="navbar">

    <div class="logo">
      <a href="../html/feed.html" class="logo-link">
        <h1>VERSE</h1>
        <div class="logo-line"></div>
      </a>
    </div>

    <div class="search-wrapper">

      <input
        type="text"
        id="globalSearchInput"
        placeholder="Pesquisar na Verse..."
        autocomplete="off">

      <div
        id="globalSearchResults"
        class="global-search-results">
      </div>

    </div>

    <div class="nav-actions">

      <a href="../html/feed.html" class="nav-icon-btn" title="Feed">
        🏠
      </a>

      <a href="../html/publications.html" class="nav-icon-btn" title="Publicações">
        📚
      </a>

      <a href="../html/comunities.html" class="nav-icon-btn" title="Comunidades">
        👥
      </a>

      <div class="notification-wrapper">

        <button id="notificationBtn" class="notification-btn" type="button">
          🔔
          <span id="notificationBadge" class="notification-badge">0</span>
        </button>

        <div id="notificationDropdown" class="notification-dropdown">

          <div class="notification-header">
            <h3>Notificações</h3>
          </div>

          <div id="notificationList" class="notification-list">
            <p class="empty-notifications">Nenhuma notificação ainda.</p>
          </div>

        </div>

      </div>

      <div class="profile-menu-wrapper">

        <button class="profile-menu-btn" id="profileMenuBtn" type="button">
          <div class="nav-avatar" id="navAvatar">V</div>
        </button>

        <div class="profile-dropdown" id="profileDropdown">
          <a href="../html/profile.html">👤 Meu perfil</a>

          <a href="../html/messages.html" class="dropdown-message-link">
            💬 Mensagens
            <span id="dropdownMessagesBadge" class="message-dot"></span>
          </a>

          <a href="../html/settings.html">⚙️ Configurações</a>

          <button id="logoutBtn" type="button">
            🚪 Sair
          </button>
        </div>

      </div>

    </div>

  </nav>

  <main class="app-layout">

    <aside class="sidebar-left">

      <h2>Configurações</h2>

      <nav class="side-menu">

        <a href="#conta">
          Conta
        </a>

        <a href="#perfil">
          Perfil
        </a>

        <a href="#notificacoes">
          Notificações
        </a>

        <a href="#aparencia">
          Aparência
        </a>

      </nav>

    </aside>

    <section class="settings-main">

      <a href="../html/profile.html" class="back-btn">
        ← Voltar ao Perfil
      </a>

      <h1>Configurações</h1>

      <div class="settings-card" id="conta">

        <h2>Conta</h2>

        <div class="setting-item">

          <label for="userEmail">
            Email
          </label>

          <input
            type="email"
            id="userEmail"
            placeholder="email@exemplo.com"
            autocomplete="email">

        </div>

        <div class="setting-item">

          <span class="setting-label">
            Alterar Senha
          </span>

          <button
            class="action-btn"
            type="button">
            Alterar Senha
          </button>

        </div>

        <div class="setting-item danger-zone">

          <span class="setting-label">
            Excluir Conta
          </span>

          <button
            class="danger-btn"
            type="button">
            Excluir Conta
          </button>

        </div>

      </div>

      <div class="settings-card" id="perfil">

        <h2>Perfil</h2>

        <label class="setting-toggle" for="privateProfile">
          <span>Perfil Privado</span>
          <input type="checkbox" id="privateProfile">
        </label>

        <label class="setting-toggle" for="showLocation">
          <span>Mostrar Localização</span>
          <input type="checkbox" id="showLocation">
        </label>

        <label class="setting-toggle" for="showGenres">
          <span>Mostrar Gêneros Favoritos</span>
          <input type="checkbox" id="showGenres">
        </label>

        <label class="setting-toggle" for="showMemberSince">
          <span>Mostrar Data de Entrada</span>
          <input type="checkbox" id="showMemberSince">
        </label>

      </div>

      <div class="settings-card" id="notificacoes">

        <h2>Notificações</h2>

        <label class="setting-toggle" for="notifyLikes">
          <span>Curtidas</span>
          <input type="checkbox" id="notifyLikes">
        </label>

        <label class="setting-toggle" for="notifyComments">
          <span>Comentários</span>
          <input type="checkbox" id="notifyComments">
        </label>

        <label class="setting-toggle" for="notifyFollowers">
          <span>Seguidores</span>
          <input type="checkbox" id="notifyFollowers">
        </label>

        <label class="setting-toggle" for="notifyMessages">
          <span>Mensagens</span>
          <input type="checkbox" id="notifyMessages">
        </label>

      </div>

      <div class="settings-card" id="aparencia">

        <h2>Aparência</h2>

        <div class="setting-item">

          <label for="themeSelect">
            Tema
          </label>

          <select id="themeSelect">
            <option value="light">Claro</option>
            <option value="dark">Escuro</option>
            <option value="auto">Automático</option>
          </select>

        </div>

      </div>

      <div class="save-area">

        <button
          id="saveSettingsBtn"
          class="save-btn"
          type="button">
          Salvar Configurações
        </button>

      </div>

    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabaseClient.js"></script>

  <script src="../js/modules/auth.js"></script>
  <script src="../js/modules/utils.js"></script>
  <script src="../js/modules/search.js"></script>
  <script src="../js/modules/avatar.js"></script>
  <script src="../js/modules/menu.js"></script>
  <script src="../js/modules/notifications.js"></script>

  <script src="../js/pages/settings.js"></script>

</body>

</html>
