<!DOCTYPE html>
<html lang="pt">

<head>

    <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#79B4A9">

    <link rel="icon" type="image/x-icon" href="../assets/favicon/favicon.ico">

    <link rel="icon" type="image/png" sizes="32x32"
        href="../assets/favicon/favicon-32x32.png">

    <link rel="icon" type="image/png" sizes="16x16"
        href="../assets/favicon/favicon-16x16.png">

    <link rel="apple-touch-icon"
        href="../assets/favicon/apple-touch-icon.png">

    <link rel="manifest"
        href="../assets/favicon/site.webmanifest">

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <meta
    name="description"
    content="Entre na Verse e continue sua jornada literária.">

  <title>Verse - Login</title>

  <link rel="stylesheet" href="../css/base/reset.css">
  <link rel="stylesheet" href="../css/base/animations.css">

  <link rel="stylesheet" href="../css/components/back-button.css">
  <link rel="stylesheet" href="../css/components/auth-form.css">
  <link rel="stylesheet" href="../css/components/auth-button.css">
  <link rel="stylesheet" href="../css/components/auth-success.css">

  <link rel="stylesheet" href="../css/pages/login.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Belleza&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>
    <a href="../index.html" class="back-button">
         ← Voltar
    </a>
    <main class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <h1>VERSE</h1>
                <span class="logo-line"></span>
            </div>
            <div class="login-header">
                <h2>Bem-vindo à Verse</h2>
                <p>Entre e continue sua jornada literária</p>
            </div>
            
            <form class="login-form" id="loginForm" novalidate>
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" required autocomplete="email">
                        <label for="email">E-mail</label>
                    </div>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <div class="input-wrapper password-wrapper">
                        <input type="password" id="password" name="password" required autocomplete="current-password">
                        <label for="password">Senha</label>
                        <button
                            type="button"
                            class="password-toggle"
                            id="passwordToggle"
                            aria-label="Mostrar ou ocultar senha">
                            <span class="eye-icon"></span>
                            👁️
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-options">
                <label class="remember-wrapper">
                    <input type="checkbox" id="remember" name="remember">
                    <span class="checkbox-label">
                    <span class="checkmark"></span>
                    Lembrar-me
                    </span>
                </label>

                <a
                    href="../html/forgot-password.html"
                    class="forgot-password">
                    Esqueceu a senha?
                </a>
                </div>

                <button type="submit" class="login-btn">
                    <span class="btn-text">Entrar</span>
                        
                    <span class="btn-loader"></span>
                </button>
            </form>

            <div class="signup-link">
                <p>Não tem conta? <a href="../html/cadastro.html">Crie uma</a></p>
            </div>

            <div class="success-message" id="successMessage">
                <div
                    class="success-icon"
                    aria-hidden="true">
                    ✓
                </div>
                <h3>Login Efetuado com Sucesso</h3>
                <p>Entrando...</p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabaseClient.js"></script>
    <script src="../js/modules/password-toggle.js"></script>

    <script src="../js/pages/login.js"></script>
    
</body>
</html>
