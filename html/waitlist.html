<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verse - Lista de Espera</title>

  <link rel="stylesheet" href="..//css/waitlist.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Belleza&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <a href="index.html" class="back-button">
    ← Voltar
  </a>

    <div class="page-waitlist">

        <div class="left-side">

            <div class="waitlist-page-image">
                <img src="../assets/pagecadastro.png" alt="Imagem de Waitlist">
            </div>

            <div class="quote">
                <p>“Um leitor vive mil vidas antes de morrer.”</p>
                <span>— George R. R. Martin</span>
            </div>

        </div>

        <div class="waitlist-container">

            <div class="waitlist-card">

                <div class="waitlist-logo">
                    <h1>VERSE</h1>
                    <span class="logo-line"></span>
                </div>

                <div class="waitlist-header">
                    <h3>JUNTE-SE A LISTA DE ESPERA</h3>
                    <p>Comece aqui sua jornada literária!</p>
                </div>

                <form class="waitlist-form" id="waitlistForm" novalidate>

                    <div class="form-group">
                        <div class="input-wrapper">
                            <input type="text" id="name" name="name" required autocomplete="name">
                            <label for="name">Nome</label>
                        </div>
                        <span class="error-message" id="nameError"></span>
                    </div>

                    <div class="form-group">
                        <div class="input-wrapper">
                            <input type="email" id="email" name="email" required autocomplete="email">
                            <label for="email">E-mail</label>
                        </div>
                        <span class="error-message" id="emailError"></span>
                    </div>

                    <button type="submit" class="waitlist-btn">
                        <span class="btn-text">Entrar na Lista</span>
                        <span class="btn-loader"></span>
                    </button>

                </form>

                <div class="success-message" id="successMessage">
                    <div class="success-icon">✓</div>
                    <h3>Você entrou na lista de espera!</h3>
                    <p>Em breve enviaremos novidades sobre o Verse.</p>
                </div>

            </div>

        </div>

    </div>

  <script src="../js/script.js"></script>

</body>
